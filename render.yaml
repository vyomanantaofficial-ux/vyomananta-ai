services:
  - type: web
    name: vyomananta-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OR_KEY
        sync: false
      - key: GROQ_KEY
        sync: false
      - key: HF_KEY
        sync: false
